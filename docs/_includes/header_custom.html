<!-- Theme toggle button: cycles Auto → Light → Dark → Auto (mirrors klibio/apps pattern) -->
<button id="theme-toggle"
        class="btn-reset bnd-theme-toggle"
        aria-label="Toggle color theme"
        title="Toggle light / dark / auto mode">
  <span class="icon-auto"  aria-hidden="true">&#9680; Auto</span>
  <span class="icon-light" aria-hidden="true">&#9728;&#xFE0F; Light</span>
  <span class="icon-dark"  aria-hidden="true">&#9790;&#xFE0F; Dark</span>
</button>
