<!-- Manual content from: ext/diffignore.md -->
<p>You can use the <code>-diffignore</code> instruction to specify manifest header names
and resource paths to ignore during baseline comparison.</p>
<h2 id="example">Example</h2>
<div class="highlight"><pre><span></span><code>-diffignore: com/foo/xyz.properties, Some-Manifest-Header
</code></pre></div>
