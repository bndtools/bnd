<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bundle-Icon</title>
<link rel="stylesheet" href="../help.css">
</head>
<body>
<h1>Bundle-Icon</h1>
<ul>
<li>
<p>Example: <code>Bundle-Icon: /icons/bnd.png;size=64</code></p>
</li>
<li>
<p>Values: <code>/icons/bundle.png</code></p>
</li>
<li>
<p>Pattern: <code>.*</code></p>
</li>
</ul>
<h3 id="options">Options</h3>
<ul>
<li><code>size</code> Icons size in pixels, e.g. 64.</li>
<li>
<p>Example: <code>size=64</code></p>
</li>
<li>
<p>Values: <code>16,32,48,64,128</code></p>
</li>
<li>
<p>Pattern: <code>\d+</code></p>
</li>
</ul>
</body>
</html>
