<h1>packageattribute ';' PACKAGE (';' ATTRIBUTE)?</h1>
<p>The <code>packageattribute</code> macro returns the value of the specified attribute name for the
specified package name. These values are only available after analysis is complete. The
default attribute to return is the version.</p>
