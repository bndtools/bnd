<h1>package</h1>
<h3 id="synopsis">Synopsis:</h3>
<div class="highlight"><pre><span></span><code>   package [options]  &lt;&lt;bnd|bndrun&gt;&gt; &lt;[...]&gt;
</code></pre></div>

<h4 id="options">Options:</h4>
<ul>
<li><code>[ -o --output &lt;string&gt; ]</code> Where to store the resulting file. Default the name of the bnd file with a .jar extension.</li>
<li><code>[ -p --profile &lt;string&gt; ]</code> Profile name. Default no profile</li>
</ul>
</body>
