<h1>copy</h1>
<h3 id="synopsis">Synopsis:</h3>
<div class="highlight"><pre><span></span><code>   copy [options]  &lt;src...&gt; &lt;dest&gt;
</code></pre></div>

<h4 id="options">Options:</h4>
<ul>
<li><code>[ -o --optional ]</code> Remove OSGI-OPT</li>
<li><code>[ -s --specific ]</code> Remove OSGi metadata from the manifest</li>
<li><code>[ -S --strip ]</code> Remove all metadata manifest</li>
</ul>
