<body>
<h1>clean</h1>
<h3 id="synopsis">Synopsis:</h3>
<div class="highlight"><pre><span></span><code>   clean [options]  ...
</code></pre></div>

<h4 id="options">Options:</h4>
<ul>
<li><code>[ -e --exclude &lt;string;&gt; ]</code> Exclude files by pattern</li>
<li><code>[ -p --project &lt;string&gt; ]</code> Identify another project</li>
<li><code>[ -v --verbose ]</code> prints more processing information</li>
<li><code>[ -w --workspace &lt;string&gt; ]</code> Use the following workspace</li>
</ul>
</body>
