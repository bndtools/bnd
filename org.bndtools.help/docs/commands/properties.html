<h1>properties</h1>
<h3 id="synopsis">Synopsis:</h3>
<div class="highlight"><pre><span></span><code>   properties [options]
</code></pre></div>

<h4 id="options">Options:</h4>
<ul>
<li><code>[ -k --key &lt;glob&gt; ]</code> Filter on key</li>
<li><code>[ -l --local ]</code> Get the inherited properties</li>
<li><code>[ -p --project &lt;string&gt; ]</code> Identify another project</li>
<li><code>[ -v --value &lt;glob&gt; ]</code> Filter on value</li>
</ul>
