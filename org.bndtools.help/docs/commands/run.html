<body>
<h1>run</h1>
<h3 id="synopsis">Synopsis:</h3>
<div class="highlight"><pre><span></span><code>   run [options]  &lt;[bndrun]&gt;
</code></pre></div>

<h4 id="options">Options:</h4>
<ul>
<li><code>[ -p --project &lt;string&gt; ]</code> Path to another project than the current project. Only valid if no bndrun is specified</li>
<li><code>[ -v --verify ]</code> Verify all the dependencies before launching (runpath, runbundles)</li>
</ul>
</body>
