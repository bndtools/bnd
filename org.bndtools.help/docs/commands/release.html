<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>release</title>
<link rel="stylesheet" href="../help.css">
</head>
<body>
<h1>release</h1>
<h3 id="synopsis">Synopsis:</h3>
<div class="highlight"><pre><span></span><code>   release [options]  ...
</code></pre></div>

<h4 id="options">Options:</h4>
<ul>
<li><code>[ -p --project &lt;string&gt; ]</code> Path to project, default is current project</li>
<li><code>[ -r --repo &lt;string&gt; ]</code> Set the release repository</li>
<li><code>[ -t --test ]</code> Release with test build</li>
<li><code>[ -w --workspace ]</code> Release all bundles in in the workspace</li>
</ul>
</body>
</html>
