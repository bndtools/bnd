name: 'CI Build'

on:
  push:
    branches-ignore:
    - 'dependabot/**'
    paths:
    - '**'
    - '!docs/**'
    - '!.github/**'
    - '.github/**/*ci*'
    - '!CONTRIBUTING.md'
    - '!DEV_README.md'
    - '!README.md'
  pull_request:
    paths:
    - '**'
    - '!docs/**'
    - '!.github/**'
    - '.github/**/*ci*'
    - '!CONTRIBUTING.md'
    - '!DEV_README.md'
    - '!README.md'

env:
  LC_ALL: en_US.UTF-8
  GRADLE_OPTS: >-
    -Dorg.gradle.parallel=true
  MAVEN_OPTS: >-
    -Dhttp.keepAlive=false
    -Dmaven.wagon.http.pool=false
    -Dmaven.wagon.http.retryHandler.count=3
    -Daether.connector.http.retryHandler.count=5
    -Daether.connector.http.reuseConnections=false
    -Daether.connector.http.connectionMaxTtl=25
    -Daether.connector.connectTimeout=120000
  BNDTOOLS_CORE_TEST_NOJUNITOSGI: true # This test is very flaky on CI
  GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  P2_SIGN: true
  P2_SIGN_KEY: ${{ secrets.GPG_KEY_ID }}
  P2_SIGN_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  P2_PUB_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
  SONATYPE_BEARER: ${{ secrets.SONATYPE_BEARER }}

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  build-canonical:
    if: ${{ (github.repository == 'bndtools/bnd') && ((github.ref == 'refs/heads/master') || (github.ref == 'refs/heads/next')) && (github.event_name != 'pull_request') }}
    strategy:
      matrix:
        os: [ 'ubuntu-latest' ]
        java: [ '17' ]
        runner: [ '{0}' ]
        include:
          - os: 'ubuntu-latest'
            java: '17'
            runner: '{0}'
            canonical: true
            reference: true
            fetch-depth: '0'
    name: Build Canonical JDK${{ matrix.java }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit
      - name: Git Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ matrix.fetch-depth }}
      - name: Set up Java 8 + ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: |
            8
            ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - name: Build
        id: build
        run: |
          ${{ format(matrix.runner, './.github/scripts/ci-build.sh') }}
      - name: Configure settings.xml for Publish
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          server-id: bndtools.jfrog.io
          server-username: JFROG_USERNAME
          server-password: JFROG_PASSWORD
      - name: Publish
        id: publish
        run: |
          env | sort
          ./.github/scripts/ci-publish.sh
        env:
          CANONICAL: true
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          SONATYPE_BEARER: ${{ secrets.SONATYPE_BEARER }}
          JFROG_USERNAME: ${{ secrets.JFROG_USERNAME }}
          JFROG_PASSWORD: ${{ secrets.JFROG_PASSWORD }}
      - name: Upload Test Reports
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Build_JDK${{ matrix.java }}_${{ matrix.os }}-test-reports
          path: |
            */generated/test-reports/*/TEST-*.xml
            maven/*/target/surefire-reports/TEST-*.xml
            gradle-plugins/*/build/test-results/*/TEST-*.xml
            gradle-plugins/build/reports/*

  build-others:
    needs: [build-canonical]
    strategy:
      fail-fast: ${{ (github.repository != 'bndtools/bnd') || ((github.ref != 'refs/heads/master') && (github.ref != 'refs/heads/next')) || (github.event_name == 'pull_request') }}
      matrix:
        os: [ 'ubuntu-latest', 'windows-latest' ]
        java: [ '21', '25' ]
        runner: [ '{0}' ]
        exclude:
          - os: 'ubuntu-latest'
            java: '17'
        include:
          - os: 'windows-latest'
            java: '17'
            runner: '{0}'
    name: Build Others JDK${{ matrix.java }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit
      - name: Git Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
      - name: Set up Java 8 + ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: |
            8
            ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - name: Build
        id: build
        run: |
          ${{ format(matrix.runner, './.github/scripts/ci-build.sh') }}
      - name: Upload Test Reports
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Build_JDK${{ matrix.java }}_${{ matrix.os }}-test-reports
          path: |
            */generated/test-reports/*/TEST-*.xml
            maven/*/target/surefire-reports/TEST-*.xml
            gradle-plugins/*/build/test-results/*/TEST-*.xml
            gradle-plugins/build/reports/*
