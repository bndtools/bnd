name: Cleanup PR p2 Repos

on:
  pull_request:
    types:
    - closed
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, only report paths that would be deleted'
        required: false
        type: boolean
        default: true

env:
  LC_ALL: en_US.UTF-8

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: read

jobs:
  cleanup:
    name: Cleanup p2/pr for closed PRs
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    - name: Delete stale p2 PR repos from JFrog
      env:
        GH_TOKEN: ${{ github.token }}
        JFROG_SNAPSHOT_TOKEN: ${{ secrets.JFROG_SNAPSHOT_TOKEN }}
        REPOSITORY: bndtools/bnd
        DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_ACTION: ${{ github.event.action || '' }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
      run: |
        set -euo pipefail

        if [ -z "${JFROG_SNAPSHOT_TOKEN:-}" ]; then
          echo "Missing secret JFROG_SNAPSHOT_TOKEN"
          exit 1
        fi

        if [ -z "${GH_TOKEN:-}" ]; then
          echo "Missing GitHub token"
          exit 1
        fi

        if [ "${EVENT_NAME}" = "pull_request" ] && [ "${EVENT_ACTION}" = "closed" ]; then
          pr="${EVENT_PR_NUMBER}"
          if [ -n "${pr}" ]; then
            jfrog_url="https://bndtools.jfrog.io/artifactory/p2/pr/${pr}"
            if [ "${DRY_RUN}" = "true" ]; then
              echo "Dry-run mode is enabled."
              echo "Would delete ${jfrog_url}"
              echo "Dry-run planned: 1"
              echo "Deleted: 0"
              echo "Missing: 0"
              echo "Failures: 0"
              exit 0
            fi

            status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
              -X DELETE \
              -H "Authorization: Bearer ${JFROG_SNAPSHOT_TOKEN}" \
              "${jfrog_url}")"

            case "${status}" in
              200|202|204)
                echo "Deleted ${jfrog_url}"
                ;;
              404)
                echo "Not found ${jfrog_url}"
                ;;
              *)
                echo "Failed to delete ${jfrog_url} (HTTP ${status})"
                exit 1
                ;;
            esac
            exit 0
          fi
        fi

        jfrog_list="$(curl --fail --silent --show-error \
          -H "Authorization: Bearer ${JFROG_SNAPSHOT_TOKEN}" \
          "https://bndtools.jfrog.io/artifactory/api/storage/p2/pr?list&deep=0&listFolders=1")"

        mapfile -t repo_prs < <(echo "${jfrog_list}" | jq -r '.files[]? | select(.folder == true) | .uri | ltrimstr("/") | select(test("^[0-9]+$"))')

        if [ "${#repo_prs[@]}" -eq 0 ]; then
          echo "No PR folders found in JFrog path p2/pr. Nothing to clean."
          exit 0
        fi

        page=1
        open_prs=()
        while :; do
          response="$(curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPOSITORY}/pulls?state=open&per_page=100&page=${page}")"

          count="$(echo "${response}" | jq 'length')"
          if [ "${count}" -eq 0 ]; then
            break
          fi

          while IFS= read -r pr_number; do
            open_prs+=("${pr_number}")
          done < <(echo "${response}" | jq -r '.[].number')

          page=$((page + 1))
        done

        open_set=" $(printf '%s ' "${open_prs[@]:-}") "

        failures=0
        deleted=0
        missing=0
        planned=0

        if [ "${DRY_RUN}" = "true" ]; then
          echo "Dry-run mode is enabled. No deletions will be performed."
        fi

        for pr in "${repo_prs[@]}"; do
          if [[ "${open_set}" == *" ${pr} "* ]]; then
            continue
          fi

          jfrog_url="https://bndtools.jfrog.io/artifactory/p2/pr/${pr}"

          if [ "${DRY_RUN}" = "true" ]; then
            if [ "${planned}" -lt 200 ]; then
              echo "Would delete ${jfrog_url}"
            fi
            planned=$((planned + 1))
            continue
          fi

          status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            -X DELETE \
            -H "Authorization: Bearer ${JFROG_SNAPSHOT_TOKEN}" \
            "${jfrog_url}")"

          case "${status}" in
            200|202|204)
              echo "Deleted ${jfrog_url}"
              deleted=$((deleted + 1))
              ;;
            404)
              echo "Not found ${jfrog_url}"
              missing=$((missing + 1))
              ;;
            *)
              echo "Failed to delete ${jfrog_url} (HTTP ${status})"
              failures=$((failures + 1))
              ;;
          esac
        done

          echo "Dry-run planned: ${planned}"
          echo "Scanned JFrog PR folders: ${#repo_prs[@]}"
          echo "Open PRs in GitHub: ${#open_prs[@]}"
        echo "Deleted: ${deleted}"
        echo "Missing: ${missing}"
        echo "Failures: ${failures}"

        remaining_list="$(curl --fail --silent --show-error \
          -H "Authorization: Bearer ${JFROG_SNAPSHOT_TOKEN}" \
          "https://bndtools.jfrog.io/artifactory/api/storage/p2/pr?list&deep=0&listFolders=1")"

        mapfile -t remaining_prs < <(echo "${remaining_list}" | jq -r '.files[]? | select(.folder == true) | .uri | ltrimstr("/") | select(test("^[0-9]+$"))' | sort -n)

        echo "Remaining p2/pr repos: ${#remaining_prs[@]}"
        if [ "${#remaining_prs[@]}" -gt 0 ]; then
          echo "Remaining repo list with PR links (up to first 200):"
          for pr in "${remaining_prs[@]:0:200}"; do
            echo "${pr} https://github.com/${REPOSITORY}/pull/${pr}"
          done
          if [ "${#remaining_prs[@]}" -gt 200 ]; then
            echo "... truncated, not showing $(( ${#remaining_prs[@]} - 200 )) additional entries"
          fi
        fi

        if [ "${failures}" -gt 0 ]; then
          exit 1
        fi
