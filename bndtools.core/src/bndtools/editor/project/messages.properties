RunBundlesPart_addWizardDescription=Select bundles to be added to the project build path for compilation.
RunBundlesPart_addWizardTitle=Project Run Path
RunBundlesPart_description=<form><p>The listed bundles will be added to the runtime.</p></form>
RunBundlesPart_descriptionAutoResolve=<form><p><b>Auto resolve mode is active:</b> The resolver runs automatically on every save, replacing -runbundles with the resolved result. Manual edits to Run Bundles will be overwritten.</p></form>
RunBundlesPart_descriptionBatch=<form><p>The listed bundles will be added to the runtime. The resolver runs before launching in batch mode (e.g. Gradle) but not in IDE mode (e.g. Eclipse).</p></form>
RunBundlesPart_descriptionBeforeLaunch=<form><p>The listed bundles will be added to the runtime. The resolver runs automatically before each launch.</p></form>
RunBundlesPart_descriptionCache=<form><p>The listed bundles will be added to the runtime. The resolver runs when needed, unless a cache file (same name prefixed with '.') is newer than the project and workspace.</p></form>
RunBundlesPart_descriptionManual=<form><p>The listed bundles will be added to the runtime. Bundles are resolved manually using the Resolve button.</p></form>
RunBundlesPart_descriptionNever=<form><p>The listed bundles will be added to the runtime. Resolving never takes place automatically. The -runbundles list must be managed entirely by hand.</p></form>
RunBundlesPart_errorGettingBuilders=Error getting project builders
RunBundlesPart_title=Run Bundles